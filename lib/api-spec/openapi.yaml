        openapi: 3.1.0
        info:
          # Do not change the title, if the title changes, the import paths will be broken
          title: Api
          version: 0.1.0
          description: Astrum Drift API
        servers:
          - url: /api
            description: Base API path
        tags:
          - name: health
            description: Health operations
          - name: auth
            description: Authentication operations
          - name: player
            description: Player state
          - name: mining
            description: Mining actions
          - name: chat
            description: Player chat channels
          - name: moderation
            description: Player reports and staff moderation
          - name: inbox
            description: Player inbox messages

        paths:
          /healthz:
            get:
              operationId: healthCheck
              tags: [health]
              summary: Health check
              description: Returns server health status
              responses:
                "200":
                  description: Healthy
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/HealthStatus"

          /auth/register:
            post:
              operationId: register
              tags: [auth]
              summary: Register a new player account
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/RegisterCredentials"
              responses:
                "201":
                  description: Registered
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Player"
                "400":
                  description: Validation error
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Invalid tester access code
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "409":
                  description: Username already taken
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /auth/login:
            post:
              operationId: login
              tags: [auth]
              summary: Log in to an existing account
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/AuthCredentials"
              responses:
                "200":
                  description: Logged in
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Player"
                "401":
                  description: Invalid credentials
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Another account is already active on this connection
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /auth/logout:
            post:
              operationId: logout
              tags: [auth]
              summary: Log out of the current session
              responses:
                "200":
                  description: Logged out
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/SuccessResponse"

          /auth/me:
            get:
              operationId: getMe
              tags: [auth]
              summary: Get the current logged-in player
              responses:
                "200":
                  description: Current player
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Player"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /players/preferences:
            patch:
              operationId: updatePlayerPreferences
              tags: [player]
              summary: Update player preferences
              description: Staff-only preference for showing role tag in live chat (mod, admin, guide).
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/UpdatePlayerPreferencesBody"
              responses:
                "200":
                  description: Updated player
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Player"
                "400":
                  description: Invalid payload
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Preference not available for this role
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /inbox/messages:
            get:
              operationId: getInboxMessages
              tags: [inbox]
              summary: List inbox messages for the current player
              responses:
                "200":
                  description: Inbox messages
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/InboxMessageList"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /inbox/unread-count:
            get:
              operationId: getInboxUnreadCount
              tags: [inbox]
              summary: Get unread inbox message count
              responses:
                "200":
                  description: Unread count
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/InboxUnreadCount"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /inbox/messages/{messageId}/read:
            post:
              operationId: markInboxMessageRead
              tags: [inbox]
              summary: Mark an inbox message as read
              parameters:
                - name: messageId
                  in: path
                  required: true
                  schema:
                    type: integer
              responses:
                "200":
                  description: Updated message
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/MarkInboxMessageReadResult"
                "400":
                  description: Invalid message id
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "404":
                  description: Message not found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /mining/start:
            post:
              operationId: startMining
              tags: [mining]
              summary: Begin a mining cycle
              description: Idempotently begins a 30-second mining cycle. If a cycle is already in progress, returns the current state without resetting it.
              responses:
                "200":
                  description: Mining state
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/MiningState"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Mining is disabled
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /mining/collect:
            post:
              operationId: collectMining
              tags: [mining]
              summary: Collect rewards from a completed mining cycle
              description: Validates server-side that the 30-second cycle has elapsed, then awards one cycle's credits + XP and clears the in-progress cycle.
              responses:
                "200":
                  description: Rewards collected
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/MiningCollectResult"
                "400":
                  description: No cycle ready yet
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Mining is disabled
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /chat/{channel}/messages:
            get:
              operationId: getChatMessages
              tags: [chat]
              summary: List chat messages for a channel
              parameters:
                - name: channel
                  in: path
                  required: true
                  schema:
                    $ref: "#/components/schemas/ChatChannel"
                - name: after
                  in: query
                  required: false
                  schema:
                    type: integer
                  description: Return messages with id greater than this cursor
                - name: limit
                  in: query
                  required: false
                  schema:
                    type: integer
                    maximum: 500
                    default: 100
                - name: hours
                  in: query
                  required: false
                  schema:
                    type: integer
                    minimum: 1
                    maximum: 168
                  description: When set, return messages from the last N hours (history view). Omit for latest live messages.
              responses:
                "200":
                  description: Chat messages
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ChatMessageList"
                "400":
                  description: Invalid channel or cursor
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
            post:
              operationId: sendChatMessage
              tags: [chat]
              summary: Send a chat message to a channel
              parameters:
                - name: channel
                  in: path
                  required: true
                  schema:
                    $ref: "#/components/schemas/ChatChannel"
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/SendChatMessageBody"
              responses:
                "201":
                  description: Message sent
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/SendChatMessageResult"
                "400":
                  description: Invalid message
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Channel unavailable
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "429":
                  description: Rate limited
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /moderation/reports:
            post:
              operationId: submitPlayerReport
              tags: [moderation]
              summary: Submit a player report
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/SubmitReportBody"
              responses:
                "201":
                  description: Report submitted
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/PlayerReportResult"
                "400":
                  description: Invalid report
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "404":
                  description: Reported player not found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "429":
                  description: Rate limited
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
            get:
              operationId: listPlayerReports
              tags: [moderation]
              summary: List player reports (staff only)
              parameters:
                - name: status
                  in: query
                  required: false
                  schema:
                    type: string
                    default: pending
              responses:
                "200":
                  description: Reports list
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/PlayerReportList"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Staff only
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /moderation/reports/{reportId}/mute:
            post:
              operationId: muteFromReport
              tags: [moderation]
              summary: Mute reported player with escalating duration (staff only)
              parameters:
                - name: reportId
                  in: path
                  required: true
                  schema:
                    type: integer
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/ModerationNoteBody"
              responses:
                "200":
                  description: Player muted
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/MuteFromReportResult"
                "400":
                  description: Invalid request
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Staff only
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "404":
                  description: Report not found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /moderation/reports/{reportId}/dismiss:
            post:
              operationId: dismissReport
              tags: [moderation]
              summary: Dismiss a player report (staff only)
              parameters:
                - name: reportId
                  in: path
                  required: true
                  schema:
                    type: integer
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/ModerationNoteBody"
              responses:
                "200":
                  description: Report dismissed
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/PlayerReportResult"
                "400":
                  description: Invalid request
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Staff only
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "404":
                  description: Report not found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /moderation/players/{playerId}/mute:
            post:
              operationId: mutePlayer
              tags: [moderation]
              summary: Mute a player directly (staff only)
              parameters:
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: integer
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/MutePlayerBody"
              responses:
                "200":
                  description: Player muted
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/MutePlayerResult"
                "400":
                  description: Invalid request
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Staff only
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "404":
                  description: Player not found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /moderation/players/{playerId}/records:
            get:
              operationId: getPlayerModerationRecords
              tags: [moderation]
              summary: Get moderation history for a player (staff only)
              parameters:
                - name: playerId
                  in: path
                  required: true
                  schema:
                    type: integer
              responses:
                "200":
                  description: Moderation records
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/PlayerModerationRecords"
                "400":
                  description: Invalid player id
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Staff only
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "404":
                  description: Player not found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /moderation/chat-messages/{messageId}:
            delete:
              operationId: deleteChatMessage
              tags: [moderation]
              summary: Soft-delete a chat message (staff only)
              parameters:
                - name: messageId
                  in: path
                  required: true
                  schema:
                    type: integer
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/DeleteChatMessageBody"
              responses:
                "200":
                  description: Message deleted
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/SuccessResponse"
                "400":
                  description: Invalid message id
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Staff only
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "404":
                  description: Message not found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /gambling/mint-coins:
            post:
              operationId: mintSilverCoins
              tags: [gambling]
              summary: Mint silver coins from fabricated ore
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/MintSilverCoinsBody"
              responses:
                "200":
                  description: Coins minted
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/MintSilverCoinsResult"
                "400":
                  description: Invalid request
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /gambling/house/play:
            post:
              operationId: playHouseGame
              tags: [gambling]
              summary: Play a house gambling game with silver coins
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/HousePlayBody"
              responses:
                "200":
                  description: Game resolved
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/HousePlayResult"
                "400":
                  description: Invalid request
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /gambling/challenges:
            get:
              operationId: listGamblingChallenges
              tags: [gambling]
              summary: List pending gambling challenges
              responses:
                "200":
                  description: Pending challenges
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/GamblingChallengeList"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
            post:
              operationId: createGamblingChallenge
              tags: [gambling]
              summary: Challenge another player to Warp Flip
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/CreateGamblingChallengeBody"
              responses:
                "201":
                  description: Challenge created
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/GamblingChallengeResult"
                "400":
                  description: Invalid request
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "404":
                  description: Opponent not found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /gambling/challenges/{challengeId}/accept:
            post:
              operationId: acceptGamblingChallenge
              tags: [gambling]
              summary: Accept a gambling challenge
              parameters:
                - name: challengeId
                  in: path
                  required: true
                  schema:
                    type: integer
              responses:
                "200":
                  description: Challenge resolved
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/AcceptGamblingChallengeResult"
                "400":
                  description: Invalid request
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "403":
                  description: Not the challenged player
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "404":
                  description: Challenge not found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

          /gambling/challenges/{challengeId}/decline:
            post:
              operationId: declineGamblingChallenge
              tags: [gambling]
              summary: Decline a gambling challenge
              parameters:
                - name: challengeId
                  in: path
                  required: true
                  schema:
                    type: integer
              responses:
                "200":
                  description: Challenge declined
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/SuccessResponse"
                "401":
                  description: Not authenticated
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"
                "404":
                  description: Challenge not found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ErrorResponse"

        components:
          schemas:
            ChatChannel:
              type: string
              enum: [global, trade, clan, help]

            ChatMessage:
              type: object
              properties:
                id:
                  type: integer
                channel:
                  $ref: "#/components/schemas/ChatChannel"
                author:
                  type: string
                text:
                  type: string
                sentAt:
                  type: string
                  format: date-time
                authorStaffTag:
                  type:
                    - string
                    - "null"
              required:
                - id
                - channel
                - author
                - text
                - sentAt
                - authorStaffTag

            ChatMessageList:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    $ref: "#/components/schemas/ChatMessage"
              required:
                - messages

            SendChatMessageBody:
              type: object
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 500
              required:
                - text

            SendChatMessageResult:
              type: object
              properties:
                message:
                  $ref: "#/components/schemas/ChatMessage"
              required:
                - message

            InboxMessage:
              type: object
              properties:
                id:
                  type: integer
                senderLabel:
                  type: string
                subject:
                  type: string
                body:
                  type: string
                readAt:
                  type:
                    - string
                    - "null"
                  format: date-time
                createdAt:
                  type: string
                  format: date-time
              required:
                - id
                - senderLabel
                - subject
                - body
                - readAt
                - createdAt

            InboxMessageList:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    $ref: "#/components/schemas/InboxMessage"
              required:
                - messages

            InboxUnreadCount:
              type: object
              properties:
                count:
                  type: integer
              required:
                - count

            MarkInboxMessageReadResult:
              type: object
              properties:
                message:
                  $ref: "#/components/schemas/InboxMessage"
              required:
                - message

            UpdatePlayerPreferencesBody:
              type: object
              properties:
                showStaffChatTag:
                  type: boolean
              required:
                - showStaffChatTag

            HealthStatus:
              type: object
              properties:
                status:
                  type: string
              required:
                - status

            ErrorResponse:
              type: object
              properties:
                error:
                  type: string
              required:
                - error

            SuccessResponse:
              type: object
              properties:
                success:
                  type: boolean
              required:
                - success

            AuthCredentials:
              type: object
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                password:
                  type: string
                  minLength: 6
                  maxLength: 128
              required:
                - username
                - password

            RegisterCredentials:
              type: object
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                password:
                  type: string
                  minLength: 6
                  maxLength: 128
                accessCode:
                  type: string
                  minLength: 1
                  maxLength: 128
              required:
                - username
                - password
                - accessCode

            Player:
              type: object
              properties:
                id:
                  type: integer
                username:
                  type: string
                role:
                  $ref: "#/components/schemas/PlayerRole"
                credits:
                  type: integer
                silverCoins:
                  type: integer
                progressVersion:
                  type: integer
                experience:
                  type: integer
                currentLocation:
                  type: string
                miningLevel:
                  type: integer
                miningStartedAt:
                  type:
                    - string
                    - "null"
                  format: date-time
                cycleDurationSec:
                  type: integer
                mutedUntil:
                  type:
                    - string
                    - "null"
                  format: date-time
                showStaffChatTag:
                  type: boolean
              required:
                - id
                - username
                - role
                - credits
                - silverCoins
