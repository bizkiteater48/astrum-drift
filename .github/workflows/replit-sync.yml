name: Sync Replit workspace

on:
  push:
    branches: [main]

jobs:
  pull-on-replit:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest on Replit
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.REPLIT_SSH_HOST }}
          username: ${{ secrets.REPLIT_SSH_USER }}
          key: ${{ secrets.REPLIT_SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            cd /home/runner/workspace
            git fetch origin
            git reset --hard origin/main
            pnpm install --frozen-lockfile
            if [ -n "${DATABASE_URL:-}" ]; then
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "UPDATE players SET role = 'admin' WHERE LOWER(username) = LOWER('Bizkiteater');"
              psql "$DATABASE_URL" -c "SELECT username, role FROM players WHERE LOWER(username) = LOWER('Bizkiteater');"
            else
              echo "DATABASE_URL not set in SSH session; republish once to run owner bootstrap on API startup."
            fi
